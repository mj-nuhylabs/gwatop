version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gwatop
      POSTGRES_PASSWORD: gwatop1234
      POSTGRES_DB: gwatop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
